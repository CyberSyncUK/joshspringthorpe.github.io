<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <!-- Cyan neon glow -->
    <filter id="cyan-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gold glow -->
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="7" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');
    </style>
  </defs>

  <!-- Subtle hex texture dots -->
  <g opacity="0.06" fill="#00F0FF">
    <circle cx="20" cy="20" r="1"/><circle cx="60" cy="20" r="1"/><circle cx="100" cy="20" r="1"/><circle cx="140" cy="20" r="1"/><circle cx="180" cy="20" r="1"/>
    <circle cx="40" cy="50" r="1"/><circle cx="80" cy="50" r="1"/><circle cx="120" cy="50" r="1"/><circle cx="160" cy="50" r="1"/>
    <circle cx="20" cy="80" r="1"/><circle cx="60" cy="80" r="1"/><circle cx="140" cy="80" r="1"/><circle cx="180" cy="80" r="1"/>
    <circle cx="40" cy="150" r="1"/><circle cx="80" cy="150" r="1"/><circle cx="120" cy="150" r="1"/><circle cx="160" cy="150" r="1"/>
    <circle cx="20" cy="180" r="1"/><circle cx="60" cy="180" r="1"/><circle cx="100" cy="180" r="1"/><circle cx="140" cy="180" r="1"/><circle cx="180" cy="180" r="1"/>
  </g>

  <!-- Outer hexagon — main frame, cyan -->
  <!-- Flat-top hex: points at top/bottom, vertices at left/right -->
  <!-- Vertices: top-left(38,30) top-right(162,30) right(188,100) bottom-right(162,170) bottom-left(38,170) left(12,100) -->
  <polygon points="100,14 175,57 175,143 100,186 25,143 25,57"
    fill="none" stroke="#00F0FF" stroke-width="2"
    filter="url(#cyan-glow)" opacity="0.9"/>

  <!-- Outer hex — solid stroke on top of glow layer -->
  <polygon points="100,14 175,57 175,143 100,186 25,143 25,57"
    fill="none" stroke="#00F0FF" stroke-width="1.5"/>

  <!-- GOLD ACCENT SEGMENTS — top-right edge and bottom-left edge -->
  <!-- Top edge (top vertex to top-right vertex) -->
  <line x1="100" y1="14" x2="175" y2="57"
    stroke="#E5A93C" stroke-width="4" stroke-linecap="round"
    filter="url(#gold-glow)"/>

  <!-- Bottom-left edge (bottom-left vertex to bottom vertex) -->
  <line x1="25" y1="143" x2="100" y2="186"
    stroke="#E5A93C" stroke-width="4" stroke-linecap="round"
    filter="url(#gold-glow)"/>

  <!-- Solid gold on top of glow -->
  <line x1="100" y1="14" x2="175" y2="57" stroke="#E5A93C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25" y1="143" x2="100" y2="186" stroke="#E5A93C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Inner hex ring — ghost, for depth -->
  <polygon points="100,36 154,66 154,126 100,156 46,126 46,66"
    fill="none" stroke="#00F0FF" stroke-width="0.75" opacity="0.2"/>

  <!-- Small gold corner nubs at hex vertices for Deus Ex detail -->
  <circle cx="100" cy="14"  r="2.5" fill="#E5A93C" opacity="0.9"/>
  <circle cx="175" cy="57"  r="2"   fill="#E5A93C" opacity="0.5"/>
  <circle cx="175" cy="143" r="2"   fill="#00F0FF" opacity="0.5"/>
  <circle cx="100" cy="186" r="2.5" fill="#E5A93C" opacity="0.9"/>
  <circle cx="25"  cy="143" r="2"   fill="#E5A93C" opacity="0.5"/>
  <circle cx="25"  cy="57"  r="2"   fill="#00F0FF" opacity="0.5"/>

  <!-- JS lettermark — centred -->
  <text x="100" y="122"
    font-family="Orbitron, 'DejaVu Sans', sans-serif"
    font-size="64" font-weight="900"
    text-anchor="middle"
    fill="#00F0FF"
    filter="url(#text-glow)"
    letter-spacing="2">JS</text>

  <!-- Solid text on top -->
  <text x="100" y="122"
    font-family="Orbitron, 'DejaVu Sans', sans-serif"
    font-size="64" font-weight="900"
    text-anchor="middle"
    fill="#00F0FF"
    letter-spacing="2">JS</text>
</svg>
